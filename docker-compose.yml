services:
  db_our_task:
    image: postgres:17
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - db_our_task_data:/var/lib/postgresql/data
  
  backend:
    build: ./backend
    env_file:
      - .env
    ports:
      - "3000:3000"
    depends_on:
      - db_our_task
    volumes:
      - ./backend:/app
  
volumes:
  db_our_task_data: